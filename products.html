<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Picks - Products</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #f4f4f4; margin: 0; padding-bottom: 50px; }
        header { background: #1a1a1a; color: white; padding: 20px; text-align: left; position: sticky; top: 0; z-index: 100; }
        .product-grid { display: flex; flex-wrap: wrap; justify-content: center; padding: 20px; }
        .card { background: white; padding: 15px; margin: 15px; border-radius: 12px; width: 280px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: relative; }
        
        /* ഒന്നിലധികം ഫോട്ടോകൾ കാണിക്കാൻ */
        .img-container { display: flex; overflow-x: auto; gap: 5px; scroll-snap-type: x mandatory; margin-bottom: 10px; border-radius: 8px; }
        .img-container img { width: 100%; height: 200px; object-fit: cover; scroll-snap-align: start; flex-shrink: 0; }
        
        .size-tag { background: #eee; padding: 5px 10px; border-radius: 4px; font-size: 14px; font-weight: bold; }
        .price { color: #e44d26; font-size: 20px; font-weight: bold; margin: 10px 0; }
        .order-btn { background: #25d366; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; text-decoration: none; display: block; }
        
        /* Edit Button */
        .edit-btn { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.6); color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; display: none; }

        /* Admin Panel */
        #admin-btn { background: #333; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin: 20px; }
        #add-product-section { display: none; background: white; padding: 25px; margin: 20px auto; max-width: 450px; border-radius: 15px; box-shadow: 0 0 20px rgba(0,0,0,0.2); text-align: left; }
        #add-product-section input, #add-product-section select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
    </style>
</head>
<body>

<header>
    <a href="index.html" style="color: white; text-decoration: none; font-size: 20px;">←</a>
    <h2 style="display: inline; margin-left: 20px;">Pixel Picks Products</h2>
</header>

<div class="product-grid" id="product-container">
    <p id="no-products">പ്രോഡക്റ്റുകൾ ഒന്നുമില്ല.</p>
</div>

<button id="admin-btn" onclick="checkPassword()">Admin Panel</button>

<div id="add-product-section">
    <h3 style="text-align: center;">Add/Edit Product</h3>
    <input type="hidden" id="edit-index">
    <input type="text" id="pName" placeholder="Product Name">
    <input type="number" id="pPrice" placeholder="Price (₹)">
    <input type="text" id="pSize" placeholder="Sizes (Ex: S, M, L, XL)">
    <label>Select Multiple Photos (Up to 6):</label>
    <input type="file" id="pPhotos" accept="image/*" multiple>
    
    <button onclick="saveProduct()" id="save-btn" style="width: 100%; background: #007bff; color: white; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">Save Product</button>
</div>

            alert("തെറ്റായ പാസ്‌വേഡ്!");
        }
    }
