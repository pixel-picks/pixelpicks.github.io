<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Picks - Shop</title>
    <style>
        :root { --primary: #25d366; --dark: #1a1a1a; --gray: #f4f4f4; }
        body { font-family: sans-serif; margin: 0; background: var(--gray); text-align: center; }
        header { background: var(--dark); color: white; padding: 15px; display: flex; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .back-btn { color: white; text-decoration: none; font-size: 24px; margin-right: 20px; }
        
        .product-grid { display: flex; flex-wrap: wrap; justify-content: center; padding: 15px; }
        .card { background: white; width: 300px; margin: 15px; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.1); position: relative; }
        
        /* Image Slider */
        .slider { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; height: 250px; background: #eee; }
        .slider img { width: 100%; height: 100%; object-fit: cover; flex-shrink: 0; scroll-snap-align: start; }
        
        .details { padding: 15px; text-align: left; }
        .price { font-size: 22px; color: #e44d26; font-weight: bold; }
        .size { background: #e1e1e1; padding: 2px 8px; border-radius: 4px; font-size: 13px; font-weight: bold; }
        .order-btn { display: block; background: var(--primary); color: white; text-align: center; padding: 12px; text-decoration: none; border-radius: 8px; margin-top: 10px; font-weight: bold; }
        
        /* Admin controls - എപ്പോഴും കാണും, പക്ഷെ ക്ലിക്ക് ചെയ്താൽ പാസ്‌വേഡ് ചോദിക്കും */
        .admin-controls { position: absolute; top: 10px; right: 10px; z-index: 10; }
        .edit-btn { background: rgba(0,0,0,0.7); color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; margin-left: 5px; }

        #admin-panel { display: none; background: white; max-width: 400px; margin: 20px auto; padding: 20px; border-radius: 15px; box-shadow: 0 0 20px rgba(0,0,0,0.1); text-align: left; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        #login-trigger { background: #333; color: white; border: none; padding: 10px 20px; border-radius: 5px; margin: 20px; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="back-btn">←</a>
    <h2 style="margin:0">Pixel Picks Products</h2>
</header>

<div class="product-grid" id="container">
    </div>

<button id="login-trigger" onclick="adminLogin()">Admin Login (Add Products)</button>

<div id="admin-panel">
    <h3 style="text-align:center">Add New Product</h3>
    <input type="hidden" id="edit-id">
    <input type="text" id="pName" placeholder="Product Name">
    <input type="number" id="pPrice" placeholder="Price (₹)">
    <input type="text" id="pSize" placeholder="Sizes (S, M, L, XL)">
    <input type="file" id="pImages" multiple accept="image/*">
    <button onclick="saveData()" style="width:100%; background:#007bff; color:white; padding:15px; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">Save Product</button>
</div>

<script>
    let productList = JSON.parse(localStorage.getItem('myProducts')) || [];

    // അഡ്മിൻ ലോഗിൻ ഫങ്ക്ഷൻ
    function adminLogin() {
        let p = prompt("Admin Password നൽകുക:");
        if(p === "2362009") {
            document.getElementById('admin-panel').style.display = 'block';
            document.getElementById('login-trigger').style.display = 'none';
        } else { alert("Wrong Password!"); }
    }

    async function saveData() {
        const name = document.getElementById('pName').value;
        const price = document.getElementById('pPrice').value;
        const size = document.getElementById('pSize').value;
        const files = document.getElementById('pImages').files;
        const editId = document.getElementById('edit-id').value;

        if(!name || !price) return alert("വിവരങ്ങൾ നൽകുക!");

        let images = [];
        if(files.length > 0) {
            for(let f of files) { images.push(await toBase64(f)); }
        } else if(editId !== "") {
            images = productList[editId].images;
        }

        let newProd = { name, price, size, images };

        if(editId === "") { productList.push(newProd); } 
        else { productList[editId] = newProd; document.getElementById('edit-id').value = ""; }

        localStorage.setItem('myProducts', JSON.stringify(productList));
        renderProducts();
        document.getElementById('admin-panel').style.display = 'none';
        document.getElementById('login-trigger').style.display = 'block';
        clearForm();
    }

    function renderProducts() {
        const cont = document.getElementById('container');
        cont.innerHTML = productList.length ? "" : '<p>നിലവിൽ പ്രോഡക്റ്റുകൾ ഒന്നുമില്ല.</p>';

        productList.forEach((p, index) => {
            let imgs = p.images.map(i => `<img src="${i}">`).join('');
            cont.innerHTML += `
                <div class="card">
                    <div class="admin-controls">
                        <button class="edit-btn" onclick="secureEdit(${index})">Edit</button>
                        <button class="edit-btn" style="background:red" onclick="secureDelete(${index})">X</button>
                    </div>
                    <div class="slider">${imgs}</div>
                    <div class="details">
                        <span class="size">${p.size || 'Free Size'}</span>
                        <h3>${p.name}</h3>
                        <div class="price">₹${p.price}</div>
                        <a href="https://wa.me/916238219175?text=Order: ${p.name}" class="order-btn">Order on WhatsApp</a>
                    </div>
                </div>
            `;
        });
    }

    // എഡിറ്റ് ചെയ്യുമ്പോൾ പാസ്‌വേഡ് ചോദിക്കാൻ
    function secureEdit(i) {
        let p = prompt("മാറ്റം വരുത്താൻ പാസ്‌വേഡ് നൽകുക:");
        if(p === "1234") {
            document.getElementById('admin-panel').style.display = 'block';
            document.getElementById('pName').value = productList[i].name;
            document.getElementById('pPrice').value = productList[i].price;
            document.getElementById('pSize').value = productList[i].size;
            document.getElementById('edit-id').value = i;
            window.scrollTo(0, document.body.scrollHeight);
        } else { alert("തെറ്റായ പാസ്‌വേഡ്!"); }
    }

    // ഡിലീറ്റ് ചെയ്യുമ്പോൾ പാസ്‌വേഡ് ചോദിക്കാൻ
    function secureDelete(i) {
        let p = prompt("ഡിലീറ്റ് ചെയ്യാൻ പാസ്‌വേഡ് നൽകുക:");
        if(p === "1234") {
            if(confirm("ഈ പ്രോഡക്റ്റ് നീക്കം ചെയ്യണോ?")) {
                productList.splice(i, 1);
                localStorage.setItem('myProducts', JSON.stringify(productList));
                renderProducts();
            }
        } else { alert("തെറ്റായ പാസ്‌വേഡ്!"); }
    }

    function clearForm() {
        document.getElementById('pName').value = "";
        document.getElementById('pPrice').value = "";
        document.getElementById('pSize').value = "";
        document.getElementById('pImages').value = "";
    }

    const toBase64 = file => new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = e => reject(e);
    });

    renderProducts();
</script>

</body>
</html>
